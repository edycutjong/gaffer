<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="Gaffer — animated">
  <defs>
    <linearGradient id="ga-wave" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#00E5FF"/><stop offset="100%" stop-color="#B6FF3D"/>
    </linearGradient>
    <filter id="ga-soft" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="ga-glint" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#CFFFF6" stop-opacity="0"/><stop offset="50%" stop-color="#EAFFFB" stop-opacity="0.6"/><stop offset="100%" stop-color="#B6FF3D" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="ga-tileclip"><rect x="16" y="16" width="480" height="480" rx="112"/></clipPath>
  </defs>
  <rect x="16" y="16" width="480" height="480" rx="112" fill="#0A0A0F"/>
  <rect x="16.5" y="16.5" width="479" height="479" rx="111.5" fill="none" stroke="#123" stroke-width="1"/>

  <!-- rotating HUD ring -->
  <circle cx="256" cy="256" r="168" fill="none" stroke="#00E5FF" stroke-width="6" opacity="0.28"
          stroke-dasharray="4 26" stroke-linecap="round">
    <animateTransform attributeName="transform" type="rotate" from="0 256 256" to="360 256 256" dur="14s" repeatCount="indefinite"/>
  </circle>

  <!-- live equalizer bars -->
  <g fill="url(#ga-wave)" filter="url(#ga-soft)">
    <rect x="150" width="30" rx="15">
      <animate attributeName="height" values="70;190;70"  dur="0.9s" repeatCount="indefinite"/>
      <animate attributeName="y"      values="221;161;221" dur="0.9s" repeatCount="indefinite"/>
    </rect>
    <rect x="196" width="30" rx="15">
      <animate attributeName="height" values="150;250;120;150" dur="1.1s" repeatCount="indefinite"/>
      <animate attributeName="y"      values="181;131;196;181" dur="1.1s" repeatCount="indefinite"/>
    </rect>
    <rect x="242" width="30" rx="15">
      <animate attributeName="height" values="240;120;280;240" dur="0.8s" repeatCount="indefinite"/>
      <animate attributeName="y"      values="136;196;116;136" dur="0.8s" repeatCount="indefinite"/>
    </rect>
    <rect x="288" width="30" rx="15">
      <animate attributeName="height" values="130;230;90;130" dur="1.05s" repeatCount="indefinite"/>
      <animate attributeName="y"      values="191;141;211;191" dur="1.05s" repeatCount="indefinite"/>
    </rect>
    <rect x="334" width="30" rx="15">
      <animate attributeName="height" values="60;170;60"  dur="0.95s" repeatCount="indefinite"/>
      <animate attributeName="y"      values="226;171;226" dur="0.95s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- offload link + surging peer node -->
  <line x1="360" y1="152" x2="416" y2="112" stroke="#B6FF3D" stroke-width="8" stroke-linecap="round">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="1.6s" repeatCount="indefinite"/>
  </line>
  <circle cx="424" cy="104" r="26" fill="#B6FF3D">
    <animate attributeName="r" values="22;30;22" dur="1.6s" repeatCount="indefinite"/>
    <animate attributeName="fill-opacity" values="0.7;1;0.7" dur="1.6s" repeatCount="indefinite"/>
  </circle>
  <text x="424" y="112" text-anchor="middle" fill="#0A0A0F" font-family="monospace" font-weight="700" font-size="26">↑</text>
  <!-- cyan-lime glint (fast, continuous) -->
  <g clip-path="url(#ga-tileclip)"><rect x="-300" y="-40" width="120" height="620" fill="url(#ga-glint)" transform="skewX(-16)">
    <animate attributeName="x" values="-300;640" dur="3s" repeatCount="indefinite"/>
  </rect></g>
</svg>

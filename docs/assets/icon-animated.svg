<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="Gaffer">
  <defs>
    <linearGradient id="gf-wave" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0" stop-color="#00E5FF"/><stop offset="1" stop-color="#B6FF3D"/>
    </linearGradient>
  </defs>
  <rect x="16" y="16" width="480" height="480" rx="112" fill="#0A0A0F"/>
  <rect x="16.5" y="16.5" width="479" height="479" rx="111.5" fill="none" stroke="#123" stroke-width="1"/>

  <!-- HUD ring + rotating accent -->
  <circle cx="256" cy="256" r="168" fill="none" stroke="#00E5FF" stroke-width="6" opacity="0.22"/>
  <circle cx="256" cy="256" r="168" fill="none" stroke="#00E5FF" stroke-width="3" stroke-dasharray="8 26" opacity="0.6">
    <animateTransform attributeName="transform" type="rotate" from="0 256 256" to="360 256 256" dur="12s" repeatCount="indefinite"/>
  </circle>

  <!-- live commentary equalizer (bottom-anchored bars) -->
  <g fill="url(#gf-wave)">
    <rect x="150" width="30" rx="15" y="216" height="80">
      <animate attributeName="height" values="80;150;50;110;80" dur="1.1s" repeatCount="indefinite"/>
      <animate attributeName="y" values="216;146;246;186;216" dur="1.1s" repeatCount="indefinite"/>
    </rect>
    <rect x="196" width="30" rx="15" y="176" height="160">
      <animate attributeName="height" values="160;90;210;120;160" dur="1.3s" repeatCount="indefinite"/>
      <animate attributeName="y" values="176;246;126;216;176" dur="1.3s" repeatCount="indefinite"/>
    </rect>
    <rect x="242" width="30" rx="15" y="136" height="240">
      <animate attributeName="height" values="240;160;270;190;240" dur="0.9s" repeatCount="indefinite"/>
      <animate attributeName="y" values="136;216;106;186;136" dur="0.9s" repeatCount="indefinite"/>
    </rect>
    <rect x="288" width="30" rx="15" y="186" height="140">
      <animate attributeName="height" values="140;220;80;170;140" dur="1.2s" repeatCount="indefinite"/>
      <animate attributeName="y" values="186;106;246;156;186" dur="1.2s" repeatCount="indefinite"/>
    </rect>
    <rect x="334" width="30" rx="15" y="226" height="60">
      <animate attributeName="height" values="60;130;40;100;60" dur="1.0s" repeatCount="indefinite"/>
      <animate attributeName="y" values="226;156;246;186;226" dur="1.0s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- offload peer node + link (compute borrowed over P2P) -->
  <line x1="360" y1="152" x2="416" y2="112" stroke="#B6FF3D" stroke-width="8" stroke-linecap="round" stroke-dasharray="6 10">
    <animate attributeName="stroke-dashoffset" values="0;-32" dur="1s" repeatCount="indefinite"/>
  </line>
  <circle cx="424" cy="104" r="26" fill="#B6FF3D">
    <animate attributeName="r" values="24;30;24" dur="1.8s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.75;1;0.75" dur="1.8s" repeatCount="indefinite"/>
  </circle>
</svg>
